<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Context Vault</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; width: 340px; min-height: 200px; padding: 16px; background: #fafafa; color: #111; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .section { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    input, select { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    button { width: 100%; padding: 8px; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #e5e7eb; color: #111; }
    .btn-danger { background: #ef4444; color: white; }
    .status { font-size: 12px; padding: 6px 8px; border-radius: 4px; margin-top: 8px; }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status.warning { background: #fef9c3; color: #713f12; }
    .status.info { background: #dbeafe; color: #1e40af; }
    .drafts-count { font-size: 13px; margin-bottom: 8px; }
    a { color: #2563eb; font-size: 12px; }
    .gap { margin-top: 8px; }
  </style>
</head>
<body>
  <h1>AI Context Vault</h1>
  <div id="app"></div>
  <script src="popup.js"></script>
</body>
</html>
